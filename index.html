<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Horror Escape</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; cursor: pointer; z-index: 10;
        }
        h1 { color: #ff0000; font-size: 3.5em; letter-spacing: 5px; margin: 0; }
        p { color: #888; font-size: 1.2em; margin: 10px 0; }
    </style>
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="instructions">
        <h1>THE INFINITE PILLARS</h1>
        <p>CLICK HERE TO START RUNNING</p>
        <p><b>WASD / Arrow Keys</b> to Move | <b>Mouse</b> to Look Around</p>
    </div>
    <div id="canvas-container"></div>

    <script>
        const container = document.getElementById('canvas-container');
        const instructions = document.getElementById('instructions');
        
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.08);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        let isLocked = false;
        let moveFwd = false, moveBwd = false, moveLft = false, moveRgt = false;
        const moveDirection = new THREE.Vector3();
        
        document.addEventListener('click', () => { if(!isLocked) container.requestPointerLock(); });
        document.addEventListener('pointerlockchange', () => {
            isLocked = (document.pointerLockElement === container);
            instructions.style.display = isLocked ? 'none' : 'flex';
        });

        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        document.addEventListener('mousemove', (e) => {
            if (!isLocked) return;
            euler.setFromQuaternion(camera.quaternion);
            euler.y -= e.movementX * 0.0025;
            euler.x -= e.movementY * 0.0025;
            euler.x = Math.max(-1.4, Math.min(1.4, euler.x));
            camera.quaternion.setFromEuler(euler);
        });

        const handleKeys = (e, val) => {
            if(e.code==='KeyW'||e.code==='ArrowUp') moveFwd=val;
            if(e.code==='KeyS'||e.code==='ArrowDown') moveBwd=val;
            if(e.code==='KeyA'||e.code==='ArrowLeft') moveLft=val;
            if(e.code==='KeyD'||e.code==='ArrowRight') moveRgt=val;
        };
        document.addEventListener('keydown', (e) => handleKeys(e, true));
        document.addEventListener('keyup', (e) => handleKeys(e, false));

        const light = new THREE.AmbientLight(0x0a0a0a); scene.add(light);
        const flash = new THREE.SpotLight(0xfffaed, 5, 40, 0.4, 0.5, 1);
        scene.add(flash); scene.add(flash.target);

        const floorGeo = new THREE.PlaneGeometry(500, 500);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI/2; scene.add(floor);

        // Generates random structural pillars instead of using a breaking text grid array
        const pilGeo = new THREE.BoxGeometry(3, 20, 3);
        const pilMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 1 });
        for(let i=0; i<60; i++) {
            const p = new THREE.Mesh(pilGeo, pilMat);
            p.position.set((Math.random()-0.5)*150, 10, (Math.random()-0.5)*150);
            if(p.position.distanceTo(camera.position) > 10) scene.add(p);
        }

        const redGeo = new THREE.CylinderGeometry(1, 1, 5, 6);
        const redMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const monster = new THREE.Mesh(redGeo, redMat);
        monster.position.set(30, 2.5, 30); scene.add(monster);

        function animate() {
            requestAnimationFrame(animate);
            if (isLocked) {
                moveDirection.set(Number(moveRgt)-Number(moveLft), 0, Number(moveBwd)-Number(moveFwd)).normalize();
                camera.translateX(moveDirection.x * 0.25);
                camera.translateZ(moveDirection.z * 0.25);
                camera.position.y = 2;

                flash.position.copy(camera.position);
                const targetVec = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                flash.target.position.copy(camera.position).add(targetVec);

                const monDir = new THREE.Vector3().subVectors(camera.position, monster.position);
                monDir.y = 0; monDir.normalize();
                monster.position.addScaledVector(monDir, 0.08);

                if (camera.position.distanceTo(monster.position) < 2.5) {
                    document.exitPointerLock();
                    alert("THE ENTITY CAUGHT YOU.");
                    camera.position.set(0, 2, 0);
                    monster.position.set(30, 2.5, 30);
                }
            }
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
